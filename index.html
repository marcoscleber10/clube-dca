<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clube DCA - Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    header {
      text-align: center;
      padding: 20px 0;
      border-bottom: 1px solid #eee;
      margin-bottom: 20px;
    }
    h1 {
      color: #667eea;
      font-size: 1.5rem;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-top: 4px;
    }
    .card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 4px solid #667eea;
    }
    .card h3 {
      color: #555;
      font-size: 1rem;
      margin-bottom: 8px;
    }
    .value {
      font-size: 1.4rem;
      font-weight: bold;
      color: #2d3748;
    }
    .positive { color: #22c55e; }
    .negative { color: #ef4444; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 10px;
      cursor: pointer;
    }
    .btn:active { background: #5568d3; }
    footer {
      text-align: center;
      color: #888;
      font-size: 0.8rem;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Clube DCA</h1>
      <p class="subtitle">Acompanhe seus investimentos em cripto</p>
    </header>

    <div class="grid">
      <div class="card">
        <h3>💰 Saldo Total</h3>
        <p class="value">R$ 12.450,80</p>
      </div>
      <div class="card">
        <h3>📈 Variação 24h</h3>
        <p class="value positive">+2,34%</p>
      </div>
    </div>

    <div class="card">
      <h3>🪙 Ativos</h3>
      <p><strong>BTC:</strong> 0.15234 <span class="positive">+1,2%</span></p>
      <p><strong>ETH:</strong> 2.4510 <span class="positive">+3,1%</span></p>
      <p><strong>BRZ:</strong> 5.200,00 <span class="negative">-0,4%</span></p>
    </div>

    <div class="card">
      <h3>🎯 Próximo DCA</h3>
      <p class="value" style="font-size:1.1rem">15 de Maio • R$ 500,00</p>
    </div>

    <button class="btn" onclick="alert('Funcionalidade em desenvolvimento!')">
      ➕ Adicionar Nova Compra
    </button>

    <footer>
      <p>Clube DCA © 2026 • Invista com consistência</p>
    </footer>
  </div>

  <script>
    // Exemplo: Atualizar valores dinamicamente
    console.log('Dashboard carregado!');
    // Aqui você pode integrar com APIs de cotação depois
  </script>
</body>
</html>
